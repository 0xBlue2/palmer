# fly.toml app configuration file generated for palmer on 2026-04-23T05:44:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'palmer'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = "matomo_db_data" # we only get one mount per machine
  # todo: set up multi-Machine setup so app data is persistent too
  destination = "/var/lib/mysql" 

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
